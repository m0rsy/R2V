  <link rel="manifest" href="manifest.json">

  <!--
    Auth inputs: kill the browser's autofill / DOM-input background so there is
    no dark rectangle painted behind the typed text inside our glass fields.
    Flutter web overlays a real <input>/<textarea> for IME + autofill; Chrome
    forces a background on :-webkit-autofill that shows through the canvas.
    These rules make that overlay fully transparent (visible text is painted by
    Flutter on the canvas, so this only removes the stray box, not the text).
  -->
  <style>
    input, textarea {
      background-color: transparent !important;
      background-image: none !important;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
      box-shadow: 0 0 0 1000px transparent inset !important;
      -webkit-text-fill-color: transparent !important;
      caret-color: transparent !important;
      transition: background-color 9999s ease-in-out 0s !important;
    }
  </style>

  <!-- Self-hosted model-viewer (was unpkg CDN). Bundle lives in web/ and is copied to build/web/ at build time. -->
  <script type="module" src="model-viewer.min.js"></script>

  <!--
    Synchronized turntable for the home page "Drag to compare texture" slider ONLY.
    The textured and untextured layers are two independent <model-viewer> instances;
    native auto-rotate would drift (the textured GLB is ~4x larger and loads later),
    so it is disabled on both (Flutter side). This single requestAnimationFrame loop
    derives one angle from a shared clock and writes the SAME camera-orbit to every
    matching element each frame, so the two layers rotate in perfect lock-step and
    the wipe reveals only the texture difference.

    Scope is strict: it only touches <model-viewer> elements whose id starts with
    "r2v-slider-" (set by _ModelComparisonSlider). It cannot affect Capture View,
    marketplace/profile thumbnails, the model detail page, or AI chat.
  -->
  <script>
    (function () {
      var SPEED_DEG_PER_SEC = 24;  // turntable speed
      var PHI = "75deg";           // polar angle  (must match Flutter _initialOrbit)
      var RADIUS = "105%";         // framing dist (must match Flutter _initialOrbit)
      function tick() {
        var els = document.querySelectorAll('model-viewer[id^="r2v-slider-"]');
        if (els.length) {
          var angle = ((performance.now() / 1000) * SPEED_DEG_PER_SEC) % 360;
          var orbit = angle.toFixed(3) + "deg " + PHI + " " + RADIUS;
          for (var i = 0; i < els.length; i++) {
            var el = els[i];
            // Snap exactly to the shared angle each frame (no per-element easing)
            // so a late-loading layer locks on instantly instead of drifting in.
            if (el.getAttribute("interpolation-decay") !== "0") {
              el.setAttribute("interpolation-decay", "0");
            }
            el.setAttribute("camera-orbit", orbit);
          }
        }
        window.requestAnimationFrame(tick);
      }
      window.requestAnimationFrame(tick);
    })();
  </script>
</head>
